<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithm Visualizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-blue: #2563eb;
        --primary-dark: #1e40af;
        --primary-light: #dbeafe;
        --accent-hover: #3b82f6;
        --bg-main: #ffffff;
        --surface: #f8fafc;
        --text-primary: #000000;
        --text-secondary: #64748b;
        --border: #e2e8f0;
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
      }

      [data-theme="dark"] {
        --primary-blue: #60a5fa;
        --primary-dark: #93c5fd;
        --primary-light: #1e3a8a;
        --accent-hover: #93c5fd;
        --bg-main: #0f172a;
        --surface: #020617;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: #1e293b;
        --success: #34d399;
        --warning: #fbbf24;
        --error: #f87171;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: var(--bg-main);
        color: var(--text-primary);
        overflow-x: hidden;
        transition:
          background 0.3s ease,
          color 0.3s ease;
      }

      /* Header */
      .header {
        position: sticky;
        top: 0;
        background: var(--surface);
        border-bottom: 2px solid var(--border);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        backdrop-filter: blur(10px);
      }

      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        background: var(--primary-blue);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .back-btn:hover {
        background: var(--primary-dark);
        transform: translateX(-3px);
      }

      .algo-title {
        font-size: 1.8rem;
        font-weight: 700;
        background: linear-gradient(
          135deg,
          var(--primary-blue),
          var(--primary-dark)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .theme-toggle {
        background: none;
        border: 2px solid var(--border);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: all 0.3s ease;
      }

      .theme-toggle:hover {
        border-color: var(--primary-blue);
        transform: scale(1.1);
      }

      /* Main Layout */
      .container {
        display: grid;
        grid-template-columns: 1fr 400px;
        gap: 2rem;
        padding: 2rem;
        max-width: 1600px;
        margin: 0 auto;
        min-height: calc(100vh - 80px);
      }

      /* Left Panel - Visualization */
      .visualization-panel {
        background: var(--surface);
        border-radius: 16px;
        border: 2px solid var(--border);
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      .input-section {
        background: var(--bg-main);
        padding: 1.5rem;
        border-radius: 12px;
        border: 2px solid var(--border);
      }

      .input-section h3 {
        margin-bottom: 1rem;
        color: var(--primary-blue);
      }

      .input-group {
        margin-bottom: 1rem;
      }

      .input-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-primary);
      }

      .input-group input,
      .input-group select {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text-primary);
        font-size: 1rem;
      }

      .input-group input:focus,
      .input-group select:focus {
        outline: none;
        border-color: var(--primary-blue);
      }

      .start-btn {
        width: 100%;
        padding: 1rem;
        background: var(--primary-blue);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .start-btn:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }

      .start-btn:disabled {
        background: var(--text-secondary);
        cursor: not-allowed;
        transform: none;
      }

      /* Visualization Area */
      .viz-area {
        flex: 1;
        background: var(--bg-main);
        border-radius: 12px;
        border: 2px solid var(--border);
        padding: 2rem;
        min-height: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .viz-placeholder {
        text-align: center;
        color: var(--text-secondary);
      }

      .viz-placeholder h3 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      /* Controls */
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .control-btn {
    padding: 0.75rem 1.5rem;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .control-btn:hover:not(:disabled) {
    border-color: var(--primary-blue);
    background: var(--primary-light);
    transform: translateY(-2px);
  }

  .control-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .control-btn.active {
    background: var(--primary-blue);
    color: white;
    border-color: var(--primary-blue);
  }

  /* Icon styling */
  .control-btn img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    transition: all 0.3s ease;
  }

  /* Dark mode - invert icons for better visibility */
  [data-theme="dark"] .control-btn:not(.active) img {
    filter: brightness(0) invert(1);
  }

  /* Active button - keep icon white */
  .control-btn.active img {
    filter: brightness(0) invert(1);
  }

  /* Disabled button - reduce opacity */
  .control-btn:disabled img {
    opacity: 0.5;
  }

      /* Right Panel - Info */
      .info-panel {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .info-card {
        background: var(--surface);
        border-radius: 16px;
        border: 2px solid var(--border);
        padding: 1.5rem;
      }

      .info-card h3 {
        color: var(--primary-blue);
        margin-bottom: 1rem;
        font-size: 1.2rem;
      }

      .info-row {
  display: flex;
  flex-direction: column;  /* ← CHANGED: vertical layout */
  gap: 0.5rem;             /* ← NEW: space between label and value */
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.info-row:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.info-label {
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 0.85rem;                /* ← NEW: smaller label */
  text-transform: uppercase;         /* ← NEW: uppercase labels */
  letter-spacing: 0.5px;             /* ← NEW: better readability */
}

.info-value {
  font-weight: 600;
  color: var(--text-primary);
  font-family: "Courier New", monospace;
  font-size: 0.95rem;                /* ← NEW: slightly smaller */
  line-height: 1.6;                  /* ← NEW: better spacing */
  word-wrap: break-word;             /* ← NEW: wrap long words */
  overflow-wrap: break-word;         /* ← NEW: wrap overflow */
}

/* NEW: Badge styling for complexity */
.complexity-badge {
  display: inline-block;
  padding: 0.25rem 0.75rem;
  background: var(--primary-light);
  color: var(--primary-dark);
  border-radius: 6px;
  font-family: "Courier New", monospace;
  font-size: 0.9rem;
  font-weight: 700;
  margin-right: 0.5rem;
  margin-bottom: 0.25rem;
}

[data-theme="dark"] .complexity-badge {
  background: var(--primary-dark);
  color: var(--bg-main);
}

/* NEW: Better text for use cases */
.use-cases-text {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--text-primary);
}

/* NEW: Category badge */
.category-badge {
  display: inline-block;
  padding: 0.4rem 1rem;
  background: var(--surface);
  border: 2px solid var(--primary-blue);
  color: var(--primary-blue);
  border-radius: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
}

/* NEW: Developer name styling */
.developer-name {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-weight: 600;
  color: var(--text-primary);
}

/* NEW: Year styling */
.year-value {
  font-family: "Courier New", monospace;
  font-weight: 700;
  color: var(--primary-blue);
}

      .description {
        color: var(--text-secondary);
        line-height: 1.6;
      }

      .pseudocode {
        background: var(--bg-main);
        border-radius: 8px;
        padding: 1rem;
        font-family: "Courier New", monospace;
        font-size: 0.9rem;
        line-height: 1.8;
        overflow-x: auto;
      }

      .pseudocode-line {
        color: var(--text-primary);
        padding: 0.2rem 0;
      }

      .pseudocode-line.active {
        background: var(--primary-light);
        color: var(--primary-dark);
        padding-left: 0.5rem;
        margin-left: -0.5rem;
        font-weight: 700;
      }

      .step-indicator {
        background: var(--bg-main);
        padding: 1rem;
        border-radius: 8px;
        text-align: center;
        font-weight: 600;
        color: var(--primary-blue);
      }

      /* Visualization Elements */
      .array-container {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .array-element {
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: 8px;
        font-weight: 700;
        font-size: 1.2rem;
        transition: all 0.3s ease;
      }

      .array-element.comparing {
        background: var(--warning);
        border-color: var(--warning);
        color: white;
        transform: scale(1.1);
      }

      .array-element.sorted {
        background: var(--success);
        border-color: var(--success);
        color: white;
      }

      .array-element.current {
        background: var(--primary-blue);
        border-color: var(--primary-blue);
        color: white;
        transform: scale(1.15);
      }

      /* Responsive */
      @media (max-width: 1200px) {
        .container {
          grid-template-columns: 1fr;
        }

        .info-panel {
          order: -1;
        }
      }

      @media (max-width: 768px) {
        .header {
          flex-direction: column;
          gap: 1rem;
        }

        .algo-title {
          font-size: 1.3rem;
        }

        .container {
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <a href="dsa-algorithms-list_auto.html" class="back-btn"> ← Back </a>
      <h1 class="algo-title" id="algoTitle">Algorithm Visualizer</h1>
      <div class="nav-controls">
        <button class="theme-toggle" id="themeToggle">
          <img
            width="22"
            height="22"
            src="assets/icons8-dark-mode-30.png"
            alt="dark mode"
          />
        </button>
    </header>

    <!-- Main Container -->
    <div class="container">
      <!-- Left Panel - Visualization -->
      <div class="visualization-panel">
        <!-- Input Section -->
        <div class="input-section">
          <h3>Input Configuration</h3>
          <div id="inputFields"></div>
          <button class="start-btn" id="startBtn">Start Visualization</button>
        </div>

        <!-- Visualization Area -->
        <div class="viz-area" id="vizArea">
          <div class="viz-placeholder">
            <h3>Ready to visualize</h3>
            <p>Configure inputs above and click "Start Visualization"</p>
          </div>
        </div>

        <!-- Controls -->
<div class="controls" id="controls" style="display: none">
  <button class="control-btn" id="playBtn">
    <img src="assets/play-btn.png" alt="Play">
    Play
  </button>
  <button class="control-btn" id="pauseBtn" disabled>
    <img src="assets/pause-btn.png" alt="Pause">
    Pause
  </button>
  <button class="control-btn" id="prevBtn">
    <img src="assets/previous-btn.png" alt="Previous">
    Previous
  </button>
  <button class="control-btn" id="stepBtn">
    <img src="assets/next-btn.png" alt="Next">
    Next
  </button>
  <button class="control-btn" id="resetBtn">
    <img src="assets/reset-btn.png" alt="Reset">
    Reset
  </button>
</div>

        <!-- Step Indicator -->
        <div class="step-indicator" id="stepIndicator" style="display: none">
          Step 1 of 1
        </div>
      </div>

      <!-- Right Panel - Info -->
      <div class="info-panel">
        <!-- Basic Info -->
        <div class="info-card">
          <h3>Algorithm Information</h3>
          <div class="info-row">
            <span class="info-label">Category:</span>
            <span class="info-value" id="category">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Time Complexity:</span>
            <span class="info-value" id="timeComplexity">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Space Complexity:</span>
            <span class="info-value" id="spaceComplexity">-</span>
          </div>
        </div>

        <!-- Description -->
        <div class="info-card">
          <h3>Description</h3>
          <p class="description" id="description">-</p>
        </div>

        <!-- Historical Info -->
        <div class="info-card">
          <h3>Historical Context</h3>
          <div class="info-row">
            <span class="info-label">Developer:</span>
            <span class="info-value" id="developer">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Year:</span>
            <span class="info-value" id="year">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Use Cases:</span>
            <span class="info-value" id="useCases" style="font-size: 0.85rem"
              >-</span
            >
          </div>
        </div>

        <!-- Pseudocode -->
        <div class="info-card">
          <h3>Pseudocode</h3>
          <div class="pseudocode" id="pseudocode">
            <!-- Will be populated dynamically -->
          </div>
        </div>
      </div>
    </div>

    <!-- Include the data file -->
    <script src="algorithms-data.js"></script>

    <script>
      // ============================================
      // GET ALGORITHM FROM URL
      // ============================================
      const urlParams = new URLSearchParams(window.location.search);
      const algoKey = urlParams.get("algo");

      // If no algorithm specified, redirect to home
      if (!algoKey || !DSAData[algoKey]) {
        window.location.href = "homepage.html";
      }

      const algoData = DSAData[algoKey];

      // ============================================
// POPULATE PAGE WITH ALGORITHM DATA
// ============================================
document.getElementById("algoTitle").textContent = algoData.name;

// Category with badge
const categoryElement = document.getElementById("category");
categoryElement.innerHTML = `<span class="category-badge">${algoData.category}</span>`;

// Time Complexity with badge formatting
const timeComplexityElement = document.getElementById("timeComplexity");
formatComplexity(timeComplexityElement, algoData.timeComplexity);

// Space Complexity with badge formatting
const spaceComplexityElement = document.getElementById("spaceComplexity");
formatComplexity(spaceComplexityElement, algoData.spaceComplexity);

// Description
document.getElementById("description").textContent = algoData.description;

// Developer with styling
const developerElement = document.getElementById("developer");
developerElement.innerHTML = `<span class="developer-name">${algoData.developer}</span>`;

// Year with styling
const yearElement = document.getElementById("year");
yearElement.innerHTML = `<span class="year-value">${algoData.yearDeveloped}</span>`;

// Use Cases with better formatting
const useCasesElement = document.getElementById("useCases");
useCasesElement.innerHTML = `<span class="use-cases-text">${algoData.useCases}</span>`;

      // Populate pseudocode
      const pseudocodeContainer = document.getElementById("pseudocode");
      algoData.pseudocode.forEach((line, index) => {
        const lineDiv = document.createElement("div");
        lineDiv.className = "pseudocode-line";
        lineDiv.id = `code-line-${index}`;
        lineDiv.textContent = line;
        pseudocodeContainer.appendChild(lineDiv);
      });

      // ============================================
      // GENERATE INPUT FIELDS DYNAMICALLY
      // ============================================
      const inputFieldsContainer = document.getElementById("inputFields");

      algoData.inputFields.forEach((field) => {
        const group = document.createElement("div");
        group.className = "input-group";

        const label = document.createElement("label");
        label.textContent = field.label;

        let input;
        if (field.type === "select") {
          input = document.createElement("select");
          input.id = field.name;
          field.options.forEach((opt) => {
            const option = document.createElement("option");
            option.value = opt;
            option.textContent = opt;
            input.appendChild(option);
          });
        } else {
          input = document.createElement("input");
          input.type = field.type === "array" ? "text" : field.type;
          input.id = field.name;
          input.placeholder = field.placeholder;
        }

        group.appendChild(label);
        group.appendChild(input);
        inputFieldsContainer.appendChild(group);
      });

      // ============================================
// HELPER FUNCTION: Format Complexity
// ============================================
function formatComplexity(element, complexityText) {
  // Split by common separators
  const parts = complexityText.split(/,|avg|worst|best/).map(s => s.trim()).filter(s => s);
  
  element.innerHTML = '';
  
  parts.forEach((part, index) => {
    const badge = document.createElement('span');
    badge.className = 'complexity-badge';
    badge.textContent = part;
    element.appendChild(badge);
    
    // Add line break after every 2 badges
    if ((index + 1) % 2 === 0 && index < parts.length - 1) {
      element.appendChild(document.createElement('br'));
    }
  });
  
  // If no parts, show original text
  if (element.children.length === 0) {
    const badge = document.createElement('span');
    badge.className = 'complexity-badge';
    badge.textContent = complexityText;
    element.appendChild(badge);
  }
}

      // ============================================
      // THEME TOGGLE
      // ============================================
      const themeToggle = document.getElementById("themeToggle");
      const html = document.documentElement;

      themeToggle.addEventListener("click", () => {
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        themeToggle.innerHTML =
          newTheme === "dark"
            ? `<img width="22" height="22"
        src="assets/icons8-light-mode-78.png"
        alt="Light Mode"/>`
            : `<img width="22" height="22"
        src="assets/icons8-dark-mode-30.png"
        alt="Dark Mode"/>`;
      });

      // ============================================
      // VISUALIZATION LOGIC
      // ============================================
      let visualizationState = {
        isRunning: false,
        isPaused: false,
        currentStep: 0,
        totalSteps: 0,
        data: null,
        intervalId: null,
      };

      const startBtn = document.getElementById("startBtn");
      const playBtn = document.getElementById("playBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const prevBtn = document.getElementById('prevBtn');
      const stepBtn = document.getElementById("stepBtn");
      const resetBtn = document.getElementById("resetBtn");
      const controls = document.getElementById("controls");
      const stepIndicator = document.getElementById("stepIndicator");
      const vizArea = document.getElementById("vizArea");

      startBtn.addEventListener("click", initializeVisualization);
      playBtn.addEventListener("click", playVisualization);
      pauseBtn.addEventListener("click", pauseVisualization);
      prevBtn.addEventListener('click', stepBackward);
      stepBtn.addEventListener("click", stepForward);
      resetBtn.addEventListener("click", resetVisualization);

      function initializeVisualization() {
        // Get input values
        const inputs = {};
        algoData.inputFields.forEach((field) => {
          const element = document.getElementById(field.name);
          if (field.type === "array") {
            inputs[field.name] = element.value
              .split(",")
              .map((v) => parseInt(v.trim()))
              .filter((v) => !isNaN(v));
          } else if (field.type === "number") {
            inputs[field.name] = parseInt(element.value);
          } else {
            inputs[field.name] = element.value;
          }
        });

        // Validate inputs
        if (
          Object.values(inputs).some(
            (v) => !v || (Array.isArray(v) && v.length === 0),
          )
        ) {
          alert("Please fill in all input fields correctly");
          return;
        }

        // Store data and initialize
        visualizationState.data = inputs;
        visualizationState.isRunning = true;
        visualizationState.currentStep = 0;

        // Show controls
        controls.style.display = "flex";
        stepIndicator.style.display = "block";

        // Render based on visualization type
        renderVisualization();
      }

      function renderVisualization() {
        vizArea.innerHTML = "";

        // Different rendering based on visualization type
        switch (algoData.visualizationType) {
          case "array":
            renderArrayVisualization();
            break;
          case "tree":
            renderTreeVisualization();
            break;
          case "graph":
            renderGraphVisualization();
            break;
          case "stack":
            renderStackVisualization();
            break;
          case "queue":
            renderQueueVisualization();
            break;
          default:
            vizArea.innerHTML =
              '<div class="viz-placeholder"><h3>Visualization in progress...</h3><p>This is a basic demo. Full visualization coming soon!</p></div>';
        }

        updateStepIndicator();
      }

      function renderArrayVisualization() {
        const container = document.createElement("div");
        container.className = "array-container";

        const array = visualizationState.data.array;
        array.forEach((value, index) => {
          const element = document.createElement("div");
          element.className = "array-element";
          element.textContent = value;
          element.id = `element-${index}`;
          container.appendChild(element);
        });

        vizArea.appendChild(container);

        // Calculate total steps (for demo purposes)
        visualizationState.totalSteps = array.length * 2;
      }

      function renderTreeVisualization() {
        vizArea.innerHTML =
          '<div class="viz-placeholder"><h3>Tree Visualization</h3><p>Tree structure will be rendered here</p></div>';
        visualizationState.totalSteps = 10;
      }

      function renderGraphVisualization() {
        vizArea.innerHTML =
          '<div class="viz-placeholder"><h3>Graph Visualization</h3><p>Graph will be rendered here with nodes and edges</p></div>';
        visualizationState.totalSteps = 8;
      }

      function renderStackVisualization() {
        vizArea.innerHTML =
          '<div class="viz-placeholder"><h3>Stack Visualization</h3><p>Stack operations will be shown here</p></div>';
        visualizationState.totalSteps = 5;
      }

      function renderQueueVisualization() {
        vizArea.innerHTML =
          '<div class="viz-placeholder"><h3>Queue Visualization</h3><p>Queue operations will be shown here</p></div>';
        visualizationState.totalSteps = 5;
      }

      function playVisualization() {
        visualizationState.isPaused = false;
        playBtn.disabled = true;
        pauseBtn.disabled = false;

        visualizationState.intervalId = setInterval(() => {
          if (visualizationState.currentStep < visualizationState.totalSteps) {
            stepForward();
          } else {
            pauseVisualization();
          }
        }, 1000); // 1 second between steps
      }

      function pauseVisualization() {
        visualizationState.isPaused = true;
        playBtn.disabled = false;
        pauseBtn.disabled = true;

        if (visualizationState.intervalId) {
          clearInterval(visualizationState.intervalId);
        }
      }

      function stepBackward() {
        if (visualizationState.currentStep > 0) {
          visualizationState.currentStep--;
          updateVisualizationStep();
          updateStepIndicator();
        }
      }

      function stepForward() {
        if (visualizationState.currentStep >= visualizationState.totalSteps) {
          return;
        }

        visualizationState.currentStep++;
        updateVisualizationStep();
        updateStepIndicator();
      }

      function updateVisualizationStep() {
        // Highlight current step in pseudocode
        document.querySelectorAll(".pseudocode-line").forEach((line) => {
          line.classList.remove("active");
        });

        const currentLine =
          visualizationState.currentStep % algoData.pseudocode.length;
        const lineElement = document.getElementById(`code-line-${currentLine}`);
        if (lineElement) {
          lineElement.classList.add("active");
        }

        // Update visualization (example for arrays)
        if (algoData.visualizationType === "array") {
          const elements = document.querySelectorAll(".array-element");
          elements.forEach((el) => el.classList.remove("comparing", "current"));

          const currentIndex = visualizationState.currentStep % elements.length;
          if (elements[currentIndex]) {
            elements[currentIndex].classList.add("current");
          }
        }
      }

      function updateStepIndicator() {
        stepIndicator.textContent = `Step ${visualizationState.currentStep} of ${visualizationState.totalSteps}`;
      }

      function resetVisualization() {
        pauseVisualization();
        visualizationState.currentStep = 0;
        visualizationState.isRunning = false;

        controls.style.display = "none";
        stepIndicator.style.display = "none";

        vizArea.innerHTML =
          '<div class="viz-placeholder"><h3>Ready to visualize</h3><p>Configure inputs above and click "Start Visualization"</p></div>';

        document.querySelectorAll(".pseudocode-line").forEach((line) => {
          line.classList.remove("active");
        });
      }
    </script>
  </body>
</html>
